<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Review Tool - Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>Firewall Rule Review</h2>
        <p class="subtitle">Upload your configuration CSV to begin analysis.</p>
        
        <form id="uploadForm">
            <div class="upload-area">
                <input type="file" id="csvFile" accept=".csv" required>
            </div>
            <button type="submit" id="uploadBtn">Analyze Rules</button>
        </form>

        <div id="status" class="status-box hidden">
            <p id="statusMessage"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
